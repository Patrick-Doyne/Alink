name: Confirm Flaky Test ChiSquareTestTest#testChisqSelectorMap

on:
  push:
  pull_request:

jobs:
  nondex-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Build jest-common without tests
        run: mvn clean install -DskipTests -pl core -am

      - name: Run normal test
        run: mvn -pl core test -Dtest=com.alibaba.alink.operator.common.statistics.ChiSquareTestTest#testChisqSelectorMap

      - name: Run NonDex
        run: mvn -pl core edu.illinois:nondex-maven-plugin:2.2.5:nondex -Dtest=com.alibaba.alink.operator.common.statistics.ChiSquareTestTest#testChisqSelectorMap
